# For now this compose file is strictly for testing the server locally

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: danceblue
      POSTGRES_PASSWORD: danceblue
      POSTGRES_DB: danceblue
    networks:
      - danceblue
    attach: false
    volumes:
      - danceblue-server-postgres-data:/var/lib/postgresql/data
    ports:
      - 5433:5432
  server:
    container_name: server
    build:
      context: .
      dockerfile: ./packages/server/Dockerfile
    ports:
      - 8000:8000
    networks:
      - danceblue
    depends_on:
      - postgres
    environment:
      ## Static env
      # Database
      DB_HOST: postgres
      DB_NAME: danceblue
      DB_UNAME: danceblue
      DB_PWD: danceblue
      # Application
      NODE_ENV: development
      APPLICATION_HOST: server

      ## Replaced env
      # Secrets
      COOKIE_SECRET: ${COOKIE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      # MS Auth
      MS_OIDC_URL: ${MS_OIDC_URL}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
    command: ["node", "dist/index.js", "--migrate-db"]
  portal:
    container_name: portal
    build:
      context: .
      dockerfile: ./packages/portal/Dockerfile
      args:
        - VITE_APP_API_BASE_URL=${BASE_URL}
    ports:
      - 3000:80

networks:
  danceblue:
    driver: bridge

volumes:
  danceblue-server-postgres-data:
